name: Testing
on:
    push:
        branches: main
        paths-ignore:
            - ".github/workflows/luajit-build.yml"
            - "project/luajit/scripts/**"
            - "LICENSE"
            - "README.md"
            - "TODO.md"
            - "haxelib.json"
            - "hxformat.json"
    workflow_dispatch:
jobs:
    Windows:
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                sample: [alter-state, array, callback, ffi, module, override, pass-variable, return-value, simple-call, stack-dump]
        steps:
            - name: Checkout
              uses: actions/checkout@main

            - name: Setup Haxe
              uses: ShadowEngineTeam/setup-haxe@main
              with:
                  haxe-version: 4.3.7

            - name: Compiling
              run: |
                  haxelib install hxcpp --quiet
                  haxelib dev hxluajit .
                  cd examples/${{matrix.sample}}
                  haxe build-win.hxml
    Linux:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                sample: [alter-state, array, callback, ffi, module, override, pass-variable, return-value, simple-call, stack-dump]
        steps:
            - name: Checkout
              uses: actions/checkout@main

            - name: Setup Haxe
              uses: ShadowEngineTeam/setup-haxe@main
              with:
                  haxe-version: 4.3.7

            - name: Compiling
              run: |
                  haxelib install hxcpp --quiet
                  haxelib dev hxluajit .
                  cd examples/${{matrix.sample}}
                  haxe build-unix.hxml
    MacOS:
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                sample: [alter-state, array, callback, ffi, module, override, pass-variable, return-value, simple-call, stack-dump]
        steps:
            - name: Checkout
              uses: actions/checkout@main

            - name: Setup Haxe
              uses: ShadowEngineTeam/setup-haxe@main
              with:
                  haxe-version: 4.3.7

            - name: Compiling
              run: |
                  haxelib install hxcpp --quiet
                  haxelib dev hxluajit .
                  cd examples/${{matrix.sample}}
                  haxe build-unix.hxml
